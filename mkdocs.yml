site_name: Shell Scripts
site_description: Assorted shell utility scripts for file conversion, text processing, media encoding, and system tasks.
site_author: Rodrigo Nemmen
site_url: https://rsnemmen.github.io/shell/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Overview: index.md
  - Text & Docs: text.md
  - PDF & PostScript: pdf-ps.md
  - Music: music.md
  - Movies: movies.md
  - File Utilities: file-utilities.md
  - Gaming: gaming.md
  - Image Processing: image-processing.md
  - Transferring: transferring.md
  - Mounting: mounting.md
  - System: system.md

markdown_extensions:
  - tables
  - fenced_code
